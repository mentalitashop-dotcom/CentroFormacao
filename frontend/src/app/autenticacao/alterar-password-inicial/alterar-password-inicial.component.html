<section class="first-access">
  <form (ngSubmit)="submit()" class="panel">
    <p class="eyebrow">Primeiro acesso</p>
    <h1>Alterar palavra-passe inicial</h1>
    <p class="hint">Define uma nova palavra-passe antes de entrares na área interna do clube.</p>

    <label>
      Nova palavra-passe
      <input
        [(ngModel)]="newPassword"
        name="newPassword"
        type="password"
        minlength="8"
        required
      />
    </label>

    <label>
      Confirmar palavra-passe
      <input
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        type="password"
        minlength="8"
        required
      />
    </label>

    <p *ngIf="error" class="error">{{ error }}</p>

    <button type="submit">
      Guardar palavra-passe
    </button>
  </form>
</section>
